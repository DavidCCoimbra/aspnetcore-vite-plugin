<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>ASP.NET Core Vite</title>
        <style>
            *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
            html { line-height: 1.5; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
            body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background-color: #f3f4f6; color: #4b5563; }
            @media (prefers-color-scheme: dark) { body { background-color: #111827; color: #9ca3af; } .card { background-color: #1f2937; } h1 { color: #f3f4f6; } a { color: #818cf8; } a:hover { color: #a5b4fc; } .divider { border-color: #374151; } code { color: #f3f4f6; } }
            .card { background: white; padding: 2.5rem; border-radius: 0.5rem; box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); max-width: 36rem; width: 100%; }
            .logos { display: flex; align-items: center; justify-content: center; gap: 1.5rem; margin-bottom: 2rem; }
            .logos svg { height: 4rem; width: auto; }
            .plus { color: #9ca3af; font-size: 1.5rem; }
            h1 { font-size: 1.125rem; font-weight: 600; color: #111827; margin-bottom: 0.5rem; }
            p { margin-top: 0.75rem; }
            .divider { border-top: 1px solid #e5e7eb; margin: 1.5rem 0; }
            a { color: #6366f1; font-weight: 600; text-decoration: none; }
            a:hover { color: #4f46e5; }
            code { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 0.875rem; font-weight: 700; color: #111827; }
        </style>
    </head>
    <body>
        <div class="card">
            <div class="logos">
                <!-- .NET logo -->

                </svg>
                <span class="plus">+</span>
                <!-- Vite logo -->

                        <linearGradient id="paint0_linear" x1="6.00017" y1="32.9999" x2="235" y2="344" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#41D1FF"/>
                            <stop offset="1" stop-color="#BD34FE"/>
                        </linearGradient>
                        <linearGradient id="paint1_linear" x1="194.651" y1="8.81818" x2="236.076" y2="292.989" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#FFEA83"/>
                            <stop offset="0.0833333" stop-color="#FFDD35"/>
                            <stop offset="1" stop-color="#FFA800"/>
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            <div>
                <p>This is the Vite development server providing Hot Module Replacement for your ASP.NET Core application.</p>
                <p>To access your application, make sure your .NET server is running:</p>
                <p style="margin-top: 1rem;"><code>dotnet run</code> or <code>dotnet watch</code></p>
            </div>
            <div class="divider"></div>
            <div>
                <p>For setup instructions and documentation:</p>
                <p><a href="https://github.com/DavidCCoimbra/aspnetcore-vite-plugin">aspnetcore-vite-plugin &rarr;</a></p>
            </div>
        </div>
    </body>
</html>
